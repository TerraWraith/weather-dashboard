<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="weather-clear">
  <main class="app-shell">
    <section class="search-panel" aria-label="Weather search">
      <div>
        <p class="eyebrow">Weather Console</p>
        <h1>City Weather Search</h1>
      </div>

      <form class="search-form" id="weatherForm">
        <label class="sr-only" for="cityInput">Enter a city name</label>
        <input id="cityInput" type="search" placeholder="Enter a city, such as Beijing" autocomplete="off" required>
        <button id="searchButton" type="submit">
          <span class="button-text">Search</span>
          <span class="button-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div class="recent-row" aria-label="Recent searches">
        <span>Recent</span>
        <div class="recent-list" id="recentList"></div>
      </div>
    </section>

    <section class="dashboard" aria-live="polite">
      <article class="current-card">
        <div class="weather-icon" id="weatherIcon" aria-hidden="true">☀</div>
        <div>
          <p class="city-name" id="cityName">Waiting for a search</p>
          <p class="weather-desc" id="weatherDescription">Enter a city name to view live weather</p>
        </div>
        <strong class="temperature" id="temperature">--°</strong>
      </article>

      <section class="metric-grid" aria-label="Weather metrics">
        <article class="metric-card">
          <span>Humidity</span>
          <strong id="humidity">--%</strong>
        </article>
        <article class="metric-card">
          <span>Wind Speed</span>
          <strong id="windSpeed">-- km/h</strong>
        </article>
        <article class="metric-card">
          <span>Feels Like</span>
          <strong id="apparentTemperature">--°</strong>
        </article>
        <article class="metric-card">
          <span>Updated</span>
          <strong id="updatedAt">--:--</strong>
        </article>
      </section>

      <p class="status-message" id="statusMessage"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
